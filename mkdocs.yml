site_name: Djali's WotR Hub 
theme:
  name: material
  icon:
    logo: fontawesome/solid/dice-d20
nav:
  - Home: index.md
  - Deep Dive Guides:
    - Shared Experience: Guides/SharedXP/active_xp.md
    - Shared Experience Addendum: Guides/SharedXP/wotr_graphs.md
    - Feud of the Faithful: Guides/Feud/feud.md
plugins:
  - search
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/pathfinder.css
  - stylesheets/extra.css
